# Environment variables
#! Please only update by modifying `env.json` then running `./j.ps1 con` to sync
name: env
"on":
  workflow_dispatch:
  workflow_call:
    outputs:
      actions_runner:
        value: windows-2025
      project_name:
        value: notes
      project_version:
        value: 0.0.0
      publish_project:
        value: "false"
      uv_version:
        value: 0.10.12
jobs:
  env:
    runs-on: ubuntu-24.04
    steps:
    - run: echo done
