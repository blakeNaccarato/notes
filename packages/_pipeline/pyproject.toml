[build-system]
requires = ["flit_core==3.9.0"]
build-backend = "flit_core.buildapi"

[project]
name = "notes-pipeline"
version = "0.0.0"
description = "Data pipeline"
dependencies = ["astroid>=3.3.1", "cappa>=0.22.4", "pydantic>=2.9.1"]
[project.scripts]
"copier-pipeline-pipeline" = "copier_pipeline_pipeline.__main__:main"

[tool.fawltydeps]
deps = ["packages/_pipeline/pyproject.toml"]
code = ["packages/_pipeline/src"]
ignore_undeclared = [
  "notes_dev",
  "notes_pipeline",
  "pipeline_helper",
]

[dependency-groups]
dev = ["colorama>=0.4.6", "dvc>=3.61.0", "rich>=14.0.0"]
