[build-system]
requires = ["uv_build==0.10.4"]
build-backend = "uv_build"
[tool.uv.build-backend]
module-root = "."

[project]
name = "notes_pipeline"
version = "0.0.0"
description = "Data pipeline"
dependencies = [
  "dulwich>=0.21.7",
  "marimo[lsp,recommended]>=0.20.4",
  "markdown-it-py>=3.0.0",
  "mdformat-frontmatter>=2.0.8",
  "mdformat>=0.7.22",
  "more-itertools>=10.7.0",
  "pydantic>=2.9.2",
  "pyyaml>=6.0.2",
  "typer>=0.9.0",
]
[project.scripts]
"notes-pipeline" = "notes_pipeline.__main__:main"
"notes_pipeline" = "notes_pipeline.__main__:main"

[tool.fawltydeps]
deps = ["packages/pipeline/pyproject.toml"]
code = ["packages/pipeline/notes_pipeline"]
ignore_undeclared = [
  # ? This project
  "notes",
  # ? Workspaces
  "lookback",
  "notes_dev",
  "notes_pipeline",
]
