[build-system]
requires = ["uv-build==0.10.12"]
build-backend = "uv_build"
[tool.uv.build-backend]
module-root = "."

[project]
name = "pipeline-helper"
version = "0.0.0"
description = "Data pipeline helper"
dependencies = [
  "cappa>=0.22.4",
  "dulwich>=0.23.0",
  "ipython>=8.26.0",
  "more-itertools>=10.4.0",
  "pandas[hdf5,performance]>=2.2.2",
  "pint>=0.24.4",
  "pydantic-settings>=2.5.2",
  "pydantic>=2.9.1",
  "pyyaml>=6.0.2",
]

[tool.fawltydeps]
deps = ["packages/_pipeline-helper/pyproject.toml"]
code = ["packages/_pipeline-helper"]
ignore_undeclared = ["notes", "notes_dev", "notes_pipeline", "pipeline_helper"]
