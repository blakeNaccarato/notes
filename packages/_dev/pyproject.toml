[build-system]
requires = ["uv_build==0.10.4"]
build-backend = "uv_build"
[tool.uv.build-backend]
module-root = "."

[project]
name = "notes_dev"
version = "0.0.0"
description = "Dev"
dependencies = [
  # ? Dev
  "cyclopts==2.9.3",
  "dulwich==0.22.1",
  "pydantic-settings==2.5.2",
  "pydantic>=2.9.1",
  "python-dotenv==1.0.1",
  # ? Docs
  "docutils==0.21.2",
  "myst-parser==3.0.1",
  "numpydoc==1.7.0",
  "ruamel-yaml==0.18.6",
  "sphinx==7.3.7",
  # ? Test
  "pytest==8.2.2",
]
[project.scripts]
"notes_dev" = "notes_dev.tools.__main__:main"
"notes-dev" = "notes_dev.tools.__main__:main"

[tool.fawltydeps]
deps = ["packages/_dev/pyproject.toml"]
code = ["packages/_dev", "tests"]
ignore_undeclared = [
  "ruamel-yaml",
  # ? This project
  "notes",
  # ? Workspaces
  "notes_dev",
  "boilercore",
]
ignore_unused = ["ruamel-yaml", "sphinx"]
[tool.fawltydeps.custom_mapping]
ruamel-yaml = ["ruamel"]
