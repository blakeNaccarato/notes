[build-system]
requires = ["uv-build==0.10.12"]
build-backend = "uv_build"
[tool.uv.build-backend]
module-root = "."

[project]
name = "notes-dev"
version = "0.0.0"
requires-python = ">=3.14"
dependencies = [
  "cappa>=0.22.4",
  "cyclopts>=3.14.2",
  "dulwich>=0.22.1",
  "pydantic-settings>=2.5.2",
  "python-dotenv>=1.0.1",
  #? Docs
  "docutils>=0.21.2",
  "loguru>=0.7.2",
  "myst-parser>=3.0.1",
  "numpydoc>=1.7.0",
  "python-dotenv>=1.1.1",
  "ruamel-yaml>=0.18.6",
  "sphinx>=7.3.7",
  #? Tests
  "pytest>=8.4.1",
]
[project.scripts]
notes-dev = "notes_dev.__main__:main"

[tool.fawltydeps]
deps = ["packages/_dev/pyproject.toml"]
code = ["packages/_dev", "docs", "tests"]
ignore_undeclared = ["notes", "notes_dev", "notes_pipeline", "pipeline_helper"]
[tool.fawltydeps.custom_mapping]
ruamel-yaml = ["ruamel"]
